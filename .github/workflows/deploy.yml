name: Deploy

# Manual, environment-gated deploy to the self-hosted Kubernetes cluster.
# Renders the Helm chart and runs `helm upgrade --install`. DB migrations run
# as a pre-upgrade Job/hook defined in the chart (see deploy/helm/pricecheck).
#
# Prerequisites (configured once in the repo's environment settings):
#   - secrets.KUBE_CONFIG   : base64 kubeconfig for the target cluster
#   - the chart templates under deploy/helm/pricecheck/templates (Phase 6)
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or v0.1.0)"
        required: true
      namespace:
        description: "Target namespace"
        default: pricecheck
        required: true

jobs:
  deploy:
    name: helm upgrade --install
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy
        run: |
          helm upgrade --install pricecheck deploy/helm/pricecheck \
            --namespace "${{ inputs.namespace }}" --create-namespace \
            --set image.tag="${{ inputs.image_tag }}" \
            --atomic --timeout 5m --wait
