# In-cluster OCI registry for the Pi cluster — avoids any external dependency.
# Exposed as a NodePort (30500) and addressed by the cluster IP (192.168.1.101:30500)
# so both Kaniko (in-cluster) and the kubelet pull use the same ref. Nodes need a
# one-time insecure-registry entry for that address (see specs/jenkins-setup.md).
# registry:2 is multi-arch and runs natively on arm64.
apiVersion: v1
kind: Namespace
metadata:
  name: pricecheck
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: pricecheck
spec:
  accessModes: ["ReadWriteOnce"]
  # k3s ships the local-path provisioner by default; change for your cluster.
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: pricecheck
  labels: { app: registry }
spec:
  replicas: 1
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "50m", memory: "128Mi", ephemeral-storage: "100Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: pricecheck
  labels: { app: registry }
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500   # containerd mirror endpoint: http://<node-ip>:30500
