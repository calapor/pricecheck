# Daily registry retention + garbage collection.
#
# The in-cluster registry (registry.yaml) never reclaims space on its own: every
# push to `main` adds an immutable per-commit tag (pricecheck/web:<sha>,
# pricecheck/worker:<sha>) that is kept forever, and overwriting the `main` tag
# orphans the previous manifest's blobs. registry:2 only frees blobs when
# `garbage-collect` is run, and only for manifests that no tag references — so
# without pruning old tags first, GC reclaims almost nothing and the PVC on the
# node hosting registry-data (local-path, currently -> rpi3) grows until builds
# fail with "no space left on device" or the node trips DiskPressure and evicts
# the running build agent (aborting the build).
#
# This CronJob mounts the same registry-data PVC (local-path RWO schedules it onto
# the registry's node automatically), then for EVERY repo in the registry (this
# registry is shared with the thetvdbkodi project and its buildah layer-cache
# repos, which also accumulate) keeps `main` + the newest KEEP tags, deletes the
# rest, and runs GC with --delete-untagged. Runs daily because a single week of
# builds across all repos is enough to fill the small Pi disk. Builds are
# serialized (disableConcurrentBuilds) and infrequent, so running GC against the
# live registry at a quiet hour is safe here.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: pricecheck
  labels: { app: registry-gc }
spec:
  schedule: "0 4 * * *"            # daily 04:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels: { app: registry-gc }
        spec:
          restartPolicy: Never
          containers:
            - name: gc
              image: registry:2.8.3
              env:
                - name: KEEP           # per-commit tags to retain per repo (plus `main`)
                  value: "3"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  ROOT=/var/lib/registry/docker/registry/v2/repositories
                  echo "Retention: keep 'main' + newest ${KEEP} tags for EVERY repo"
                  # Discover every repo (including nested paths like
                  # thetvdbkodi/frontend/cache) instead of a hardcoded list, so no
                  # repo silently grows forever.
                  find "$ROOT" -type d -path '*/_manifests/tags' | while read -r tagdir; do
                    repo=$(echo "$tagdir" | sed "s#^$ROOT/##; s#/_manifests/tags\$##")
                    # newest-first, drop `main`, skip the newest KEEP, delete the rest
                    ls -1t "$tagdir" | grep -v '^main$' | tail -n +$((KEEP + 1)) | while read -r t; do
                      echo "  $repo: deleting tag $t"
                      rm -rf "$tagdir/$t"
                    done
                  done
                  echo "Running garbage-collect --delete-untagged"
                  registry garbage-collect --delete-untagged /etc/docker/registry/config.yml
              volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                limits:   { cpu: "500m", memory: "512Mi" }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: registry-data
