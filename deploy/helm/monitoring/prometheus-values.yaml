server:
  service:
    type: NodePort
    nodePort: 30093   # was 30091 — collided with default/tvkodbdi-demo-frontend-service
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  persistentVolume:
    size: 5Gi
    storageClass: local-path
  retention: 15d

# Scrape worker pods in the pricecheck namespace via their annotations.
# Worker carries: prometheus.io/scrape=true, prometheus.io/port=9091
extraScrapeConfigs: |
  - job_name: pricecheck-worker
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [pricecheck]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        separator: ":"
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

alertmanager:
  enabled: false

pushgateway:
  enabled: false
