service:
  type: NodePort
  nodePort: 30300

resources:
  requests: { cpu: 50m,  memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }

persistence:
  enabled: true
  size: 1Gi
  storageClass: local-path

# adminPassword injected at deploy time via --set from Jenkins credential

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
