service:
  type: NodePort
  nodePort: 30300

resources:
  requests: { cpu: 50m,  memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }

persistence:
  enabled: true
  size: 1Gi
  storageClass: local-path

# adminPassword injected at deploy time via --set from Jenkins credential

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus   # stable uid referenced by provisioned dashboards
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-resources:
      json: |
        {
          "uid": "node-resources",
          "title": "Node Resources \u2014 CPU, Disk & Memory",
          "tags": [
            "nodes",
            "infrastructure"
          ],
          "timezone": "browser",
          "schemaVersion": 39,
          "refresh": "30s",
          "time": {
            "from": "now-6h",
            "to": "now"
          },
          "panels": [
            {
              "type": "gauge",
              "title": "CPU Used %",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 0,
                "y": 0
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "100 * (1 - avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "min": 0,
                  "max": 100,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": null
                      },
                      {
                        "color": "yellow",
                        "value": 75
                      },
                      {
                        "color": "red",
                        "value": 90
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "options": {
                "showThresholdLabels": false,
                "showThresholdMarkers": true
              }
            },
            {
              "type": "gauge",
              "title": "Memory Used %",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 8,
                "y": 0
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "min": 0,
                  "max": 100,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": null
                      },
                      {
                        "color": "yellow",
                        "value": 75
                      },
                      {
                        "color": "red",
                        "value": 90
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "options": {
                "showThresholdLabels": false,
                "showThresholdMarkers": true
              }
            },
            {
              "type": "gauge",
              "title": "Disk Used % (/)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 16,
                "y": 0
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "100 * (1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}))",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "min": 0,
                  "max": 100,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": null
                      },
                      {
                        "color": "yellow",
                        "value": 75
                      },
                      {
                        "color": "red",
                        "value": 90
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "options": {
                "showThresholdLabels": false,
                "showThresholdMarkers": true
              }
            },
            {
              "type": "timeseries",
              "title": "CPU Used % over time",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 0,
                "y": 8
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "100 * (1 - avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "min": 0,
                  "custom": {
                    "drawStyle": "line",
                    "fillOpacity": 10,
                    "showPoints": "never"
                  }
                },
                "overrides": []
              },
              "options": {
                "legend": {
                  "displayMode": "list",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi"
                }
              }
            },
            {
              "type": "timeseries",
              "title": "Memory Used % over time",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 8,
                "y": 8
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "min": 0,
                  "custom": {
                    "drawStyle": "line",
                    "fillOpacity": 10,
                    "showPoints": "never"
                  }
                },
                "overrides": []
              },
              "options": {
                "legend": {
                  "displayMode": "list",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi"
                }
              }
            },
            {
              "type": "timeseries",
              "title": "Disk Free (/)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 16,
                "y": 8
              },
              "targets": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                  },
                  "expr": "node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}",
                  "legendFormat": "{{node}}",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "bytes",
                  "min": 0,
                  "custom": {
                    "drawStyle": "line",
                    "fillOpacity": 10,
                    "showPoints": "never"
                  }
                },
                "overrides": []
              },
              "options": {
                "legend": {
                  "displayMode": "list",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi"
                }
              }
            }
          ]
        }
