# PriceCheck Helm values.
# Defaults target a self-contained STAGING deploy: in-cluster Postgres + Redis,
# a chart-managed env Secret, and a Traefik Ingress. Override for production
# (external/managed Postgres, existing Secret, real host + TLS).

nameOverride: ""
fullnameOverride: ""

image:
  # In-cluster registry addressed by a stable node IP + NodePort, so the same ref
  # works for the in-cluster builder (Kaniko) and the host-level kubelet pull.
  # Nodes need a one-time, project-agnostic mirror for this address (insecure/HTTP) —
  # see specs/jenkins-setup.md. Override with ghcr.io for the GitHub Actions path.
  registry: 192.168.1.101:30500
  # Images are {registry}/{repository}/web and {registry}/{repository}/worker.
  # The worker image also runs scheduler + migrations.
  repository: pricecheck
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
# e.g. [{ name: ghcr-pull }] when pulling private GHCR images.

web:
  replicas: 1
  port: 3000
  # ClusterIP by default (fronted by the Ingress). The demo overlay switches this
  # to NodePort so the showcase is reachable at http://<node-ip>:<nodePort>.
  service:
    type: ClusterIP
    nodePort: "" # only used when type=NodePort
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

worker:
  replicas: 1
  concurrency: 4
  metricsPort: 9091
  # Headroom for the headless-browser fallback: Chromium can use a few hundred MB
  # per page, and up to `concurrency` scrapes may escalate at once.
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: "1", memory: 2Gi }

scheduler:
  # Daily sweep. The CronJob enqueues a scrape for every enabled offer.
  schedule: "0 6 * * *"
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 250m, memory: 256Mi }

# Pre-upgrade/-install Job that runs `pnpm db:migrate`.
migrations:
  enabled: true

ingress:
  enabled: true
  className: traefik
  host: ""
  annotations: {}
  tls: []
  # - secretName: pricecheck-tls
  #   hosts: [pricecheck.example.com]

config:
  pgPoolMax: "5"
  generatorMaxTokens: "16000"

# Showcase/demo instance. Off by default so the real release is unaffected; the
# demo overlay (values-demo.yaml) turns these on for the `pricecheck-demo` release.
demo:
  # Injected as DEMO_MODE; gates the /admin "reseed" button + endpoint.
  mode: false
  seed:
    # Adds a post-install/-upgrade Job that loads the SuperValu sample dataset
    # (with reset), so every redeploy refreshes the demo data.
    enabled: false

secrets:
  # When create=true the chart builds a Secret holding DATABASE_URL + REDIS_URL
  # (computed from postgres/redis below, or from the *Url fields when those are
  # disabled). For production set create=false and point existingSecret at a
  # Secret with DATABASE_URL and REDIS_URL keys.
  create: true
  existingSecret: ""
  databaseUrl: "" # used only when postgres.enabled=false
  redisUrl: "" # used only when redis.enabled=false
  adminPassword: "" # password for the /admin AI-usage dashboard (admin disabled if empty)
  anthropicApiKey: "" # Anthropic API key for scraper generation (feature disabled if empty)

# In-cluster Postgres (StatefulSet). STAGING ONLY — for production disable this
# and use CloudNativePG or a managed Postgres, then supply secrets.databaseUrl /
# secrets.existingSecret.
postgres:
  enabled: true
  image: postgres:16-alpine
  database: pricecheck
  username: pricecheck
  password: pricecheck
  storage: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

# In-cluster Redis (used by BullMQ + latest-price cache).
redis:
  enabled: true
  image: redis:7-alpine
  storage: 1Gi
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }
