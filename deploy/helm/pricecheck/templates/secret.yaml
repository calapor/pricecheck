{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pricecheck.fullname" . }}-env
  labels:
    {{- include "pricecheck.labels" . | nindent 4 }}
    {{- include "pricecheck.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "pricecheck.databaseUrl" . | quote }}
  REDIS_URL: {{ include "pricecheck.redisUrl" . | quote }}
  {{- if .Values.secrets.adminPassword }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.flagsDatabaseUrl }}
  FLAGS_DATABASE_URL: {{ .Values.secrets.flagsDatabaseUrl | quote }}
  {{- end }}
{{- end }}
