{{- if .Values.postgres.enabled }}
# In-cluster Postgres for staging. Production should use CloudNativePG or a
# managed Postgres (set postgres.enabled=false + secrets.databaseUrl/existingSecret).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pricecheck.fullname" . }}-postgres
  labels:
    {{- include "pricecheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    {{- include "pricecheck.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pricecheck.fullname" . }}-postgres
  labels:
    {{- include "pricecheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "pricecheck.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "pricecheck.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "pricecheck.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          lifecycle:
            postStart:
              exec:
                # POSTGRES_PASSWORD is only applied when initdb first creates an
                # empty PVC. Without this, rotating postgres.password leaves the role
                # on its original password while DATABASE_URL carries the new one, so
                # app/migrate auth fails with 28P01 (BackoffLimitExceeded). Reconcile
                # the role password to the Secret on every start, over the local unix
                # socket (initdb --auth-local trust — no password needed).
                command:
                  - /bin/sh
                  - -c
                  - |
                    until pg_isready -U "$POSTGRES_USER" -h /var/run/postgresql -q; do sleep 2; done
                    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                      -h /var/run/postgresql \
                      -c "ALTER USER \"$POSTGRES_USER\" WITH PASSWORD '$POSTGRES_PASSWORD'"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
